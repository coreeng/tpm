# GoReleaser configuration for tpm.
# Docs: https://goreleaser.com
version: 2

project_name: tpm

before:
  hooks:
    - go mod tidy

builds:
  - id: tpm
    main: .
    binary: tpm
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/coreeng/tpm/cmd.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: tpm
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: coreeng
    name: tpm
  draft: false
  prerelease: auto

# Homebrew formula for macOS and Linux users, published into CECG's existing
# public tap (coreeng/homebrew-public, tapped as `coreeng/public`). Matches the
# layout of the tap's other tools (e.g. semver-utils): a GoReleaser-generated
# formula at the repo root, covering darwin/linux × amd64/arm64.
#
# Requires a HOMEBREW_TAP_GITHUB_TOKEN secret with Contents:write on
# coreeng/homebrew-public. See README "Installation".
brews:
  - name: tpm
    repository:
      owner: coreeng
      name: homebrew-public
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    # Formulae live at the repo root in this tap, not under Formula/.
    directory: .
    commit_msg_template: "chore(tpm): update Homebrew formula to {{ .Tag }}"
    homepage: "https://github.com/coreeng/tpm"
    description: "Training Platform Module (tpm) CLI — author and manage training modules and labs"
    commit_author:
      name: goreleaser-bot
      email: bot@coreeng.io
    # Skip pushing the formula for snapshots/prereleases, and also until the tap
    # token is configured — so binary releases still succeed before the token
    # exists. Publishing turns on automatically once the token is set.
    skip_upload: '{{ if .Env.HOMEBREW_TAP_GITHUB_TOKEN }}auto{{ else }}true{{ end }}'
