name: CodeQL (SAST)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    # Code scanning upload needs the repo to be public (or GitHub Advanced
    # Security enabled). Skip while private so this isn't a permanently-failing
    # check; it runs automatically once the repo is open-sourced.
    if: ${{ github.event.repository.private == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
