name: Release

# Automatically incremented, semantic-versioned releases.
#
# On every push to main this workflow analyzes commits since the previous tag.
# Because this repo uses squash-only merges with the PR title and body as the
# squash commit, each PR normally defines the release impact. If no commit asks
# for a major or minor release, the action falls back to a patch release.
# GoReleaser publishes binaries, checksums and the Homebrew formula. Tagging +
# release run in one job so no Personal Access Token is needed (a tag pushed by
# GITHUB_TOKEN does not retrigger workflows).
#
# To cut a release at an explicit version instead, push a tag manually:
#   git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version (dry run)
        id: tag
        if: startsWith(github.ref, 'refs/heads/')
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          dry_run: true

      - name: Create and push tag
        # Create a lightweight tag locally at HEAD and push it, so GoReleaser sees a
        # tag that points at the checked-out commit. Pushing with GITHUB_TOKEN does
        # not retrigger this workflow, so there is no release loop.
        if: steps.tag.outputs.new_tag != '' && startsWith(github.ref, 'refs/heads/')
        run: |
          git tag "${{ steps.tag.outputs.new_tag }}"
          git push origin "${{ steps.tag.outputs.new_tag }}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run GoReleaser
        # On a branch push, only release when a new tag was created.
        if: steps.tag.outputs.new_tag != '' || startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Token with write access to coreeng/homebrew-tap so the brew formula
          # can be published. Set this repository/org secret to enable the tap.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # When triggered by a branch push, tell GoReleaser the freshly created tag.
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag }}
